<!DOCTYPE html>
<html lang="en-GB">
<head>
    <link rel="stylesheet" href="style.css">
    <title>The Focus Path</title>
</head>
<body>
    <header>
        <h1>✨ The Focus Path</h1>
        <p>Swap the habit. Reclaim your spirit.</p>
    </header>

    <main>
        <section id="craving-zone">
            <h2>Feeling a craving?</h2>
            <button onclick="startTimer()">Start 5-Minute Focus</button>
            <p id="timer-display">Press start to begin your habit swap.</p>
        </section>

        <section id="alternatives">
            <div class="card">
                <h3>📖 Study</h3>
                <p>Open your notes. Give it 5 minutes of total focus.</p>
            </div>
            <div class="card">
                <h3>🙏 Faith</h3>
                <p>Connect with your creator. Recite a prayer or meditate.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
